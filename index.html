<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smurf Defense - Vila em Perigo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="ui-overlay">
        <div class="header">
            <h1 class="game-title">Smurf Defense</h1>
            <div class="stats-container">
                <div class="stat-item">🍒 <span id="currency">100</span></div>
                <div class="stat-item">💙 <span id="lives">20</span></div>
                <div class="stat-item">🌊 Onda: <span id="wave">1</span></div>
            </div>
        </div>
        <div id="tower-menu">
            <div class="tower-btn" id="btn-robust" title="Smurf Robusto (50 berries)">
                <div class="icon" style="background: #3498db;"></div>
                <span class="label">Robusto (50)</span>
            </div>
            <div class="tower-btn" id="btn-genius" title="Smurf Gênio (75 berries)">
                <div class="icon" style="background: #9b59b6;"></div>
                <span class="label">Gênio (75)</span>
            </div>
            <div class="tower-btn" id="btn-ette" title="Smurfette (120 berries)">
                <div class="icon" style="background: #f1c40f;"></div>
                <span class="label">Smurfette (120)</span>
            </div>
        </div>
        <div id="upgrade-panel" class="hidden">
            <h3 id="upgrade-title">Níveis do Smurf</h3>
            <div class="upgrade-info">
                <div class="upgrade-item">
                    <span>Dano: Lvl <span id="up-damage-lvl">1</span> (<span id="up-damage-val">0</span>)</span>
                    <button id="btn-up-damage">Upgrade (<span id="up-damage-cost">30</span> 🍒)</button>
                </div>
                <div class="upgrade-item">
                    <span>Alcance: Lvl <span id="up-range-lvl">1</span> (<span id="up-range-val">0</span>)</span>
                    <button id="btn-up-range">Upgrade (<span id="up-range-cost">30</span> 🍒)</button>
                </div>
            </div>
            <button id="btn-sell" class="sell-btn">Vender Smurf</button>
        </div>
        <div id="game-over" class="hidden">
            <div class="modal">
                <h2>Gargamel Venceu!</h2>
                <button onclick="location.reload()">Tentar Novamente</button>
            </div>
        </div>
    </div>
    <script src="src/game.js"></script>
</body>

</html>
