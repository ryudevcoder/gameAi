<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touge Drift Master - Fujiwara Descent</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            border: 4px solid #f09;
            /* Neon pink border for that 90s aesthetic */
            box-shadow: 0 0 20px rgba(255, 0, 153, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        .ui-panel {
            position: absolute;
            pointer-events: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }

        #timer {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #0ff;
            /* Cyan */
        }

        #speedometer {
            bottom: 20px;
            right: 20px;
            font-size: 32px;
            color: #f00;
            /* Red */
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <!-- UI Elements managed by Phaser, but defined here for visual style -->
    <div id="timer" class="ui-panel">00:00.00</div>
    <div id="speedometer" class="ui-panel">0 KM/H</div>

    <div class="instructions">
        SETAS/WASD: Dirigir | ESPAÇO: Freio de Mão (Drift!)
    </div>

    <script src="src/game.js"></script>
</body>

</html>
